# ──────────────────────────────────────────────
# Claude Code + Ghostty — tmux config
# ──────────────────────────────────────────────

# True color support (matches Ghostty)
set -g default-terminal "tmux-256color"
set -s terminal-overrides ",xterm-ghostty:RGB,*:Tc"

# Allow passthrough (needed for Claude Code cursor + clipboard)
set -g allow-passthrough on

# Extended terminal features for Ghostty
set -s terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:clipboard:ccolour:cstyle:focus:title:RGB"

# Enable mouse (scrolling, pane select, resize)
set -g mouse on

# prefix + m = toggle mouse (off → native Ghostty selection, on → tmux mouse)
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# NOTE: smcup@:rmcup@ removed — it disabled the alternate screen buffer,
# causing jerky rendering in TUI apps like Claude Code

# Copy tmux selection to system clipboard
set -g set-clipboard on
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Increase scrollback (matches your Ghostty 100k)
set -g history-limit 100000

# No delay on escape (critical for vim/Claude Code)
set -sg escape-time 0

# Start windows/panes at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Cap automatic window names to prevent status bar overflow
setw -g automatic-rename-format '#{=40:pane_title}'

# ──────────────────────────────────────────────
# Prefix: Ctrl-a (easier than Ctrl-b)
# ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ──────────────────────────────────────────────
# Splits — match your Ghostty keybinds feel
# ──────────────────────────────────────────────
bind j split-window -h -c "#{pane_current_path}" \; select-layout tiled
bind i split-window -v -c "#{pane_current_path}" \; select-layout tiled

# Auto-tile disabled: agent teammate spawns (Claude Code teammateMode=tmux)
# call split-window directly, and a global re-tile resizes every existing pane.
# Manual splits (bind j/i/c/s) still run select-layout tiled explicitly;
# prefix+= rebalances on demand.

# ──────────────────────────────────────────────
# Vim-style pane navigation (matches Ghostty ctrl+hjkl)
# ──────────────────────────────────────────────
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane resize with prefix + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch sessions (Tab cycles through, wraps around)
bind Tab switch-client -n
bind BTab switch-client -p

# Rename current session
bind R command-prompt -I '#S' "rename-session '%%'"

# Equalize panes (like your cmd+opt+equal)
bind = select-layout tiled

# Zoom toggle (like your cmd+opt+enter)
bind z resize-pane -Z

# ──────────────────────────────────────────────
# Terminal-agnostic status bar — uses ANSI palette references so colors
# adapt to whichever terminal theme is active (Ghostty claude-code,
# iTerm Claude Quiet, Apple Classic, etc.). Same pattern as `bat --theme=ansi`.
#
# Semantic role           ANSI ref      Notes
#   inactive UI text      colour8       bright black / dim grey
#   active session bg     colour12      bright blue (lifted, legible everywhere)
#   active session fg     colour0       black (inverts cleanly on bright bg)
#   prefix / zoom alerts  colour11      bright yellow
#   git info / accent     colour5       magenta
#   hostname bg           colour13      bright magenta (inversion bg)
# ──────────────────────────────────────────────

# Status bar
set -g status-position bottom
set -g status-style "bg=default,fg=default"
set -g status-left-length 60
set -g status-right-length 120
set -g status-interval 5
set -g status-left "#{S:#[range=session|#{session_id}]#{?session_attached,#[fg=colour0 bg=colour12 bold],#[fg=colour8 bg=default]} #S #[norange]}#[fg=colour8 bg=default nobold]│ "
set -g status-right "#{?client_prefix,#[fg=colour11 bold] C-a ,}#{?window_zoomed_flag,#[fg=colour11] Z ,}#[fg=colour8]#(~/bin/tmux-short-path '#{pane_current_path}') #[fg=colour5]#(~/bin/tmux-git-info '#{pane_current_path}')#(~/bin/tmux-claude-session '#{pane_tty}') #[fg=colour8]│ #[fg=colour8]%H:%M #[fg=colour0,bg=colour13,bold] #(if [ -n \"$SSH_CLIENT\" ] || [ -n \"$SSH_TTY\" ]; then hostname -s; else echo local; fi) "

# Window tabs hidden — tiled panes, not tabs
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""
set -g status-justify left

# Pane borders (label via bin/tmux-pane-label: repo  branch ↑ahead ↓behind)
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour13,bold"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format " #(~/bin/tmux-pane-label '#{pane_current_path}') "

# Copy-mode selection highlight (ANSI colors — hex not rendered in copy mode on Ghostty+tmux 3.6a)
setw -g mode-style "bg=yellow,fg=black,bold"

# Message/command bar
set -g message-style "bg=default,fg=default"

# ──────────────────────────────────────────────
# Claude Code workflow helpers
# ──────────────────────────────────────────────

# prefix + c = new Claude Code pane (tiled into current window)
bind c split-window -c "#{pane_current_path}" "claude" \; select-layout tiled

# prefix + s = new shell pane (tiled into current window)
bind s split-window -c "#{pane_current_path}" \; select-layout tiled

# prefix + C = Claude Code layout (claude left 65%, shell right 35%)
bind C new-window -c "#{pane_current_path}" \; \
  send-keys "claude" Enter \; \
  split-window -h -p 35 -c "#{pane_current_path}" \; \
  select-pane -L

# prefix + g = Claude session manager popup
bind g display-popup -E -w 80% -h 70% "$HOME/.cargo/bin/claude-tmux"

# prefix + y = copy Claude session ID to clipboard
bind y run-shell "~/bin/tmux-claude-session '#{pane_tty}' | sed 's/.*claude://' | tr -d '[:space:]' | pbcopy && tmux display 'Session ID copied'"

# prefix + p = copy pane path to clipboard
bind p run-shell "echo -n '#{pane_current_path}' | pbcopy && tmux display 'Path copied'"

# prefix + E = expose/tile toggle (all windows ↔ tiled panes)
bind E run-shell "$HOME/bin/tmux-tile-session toggle"

# prefix + X = kill all other panes in current window (clean up orphaned agent panes)
bind X confirm-before -p "Kill all other panes in this window? (y/n)" "kill-pane -a"

# prefix + P = toggle pane border labels (top / off)
bind P if-shell 'tmux show-option -g pane-border-status | grep -q "off"' \
  'set-option -g pane-border-status top; display-message "Pane labels ON"' \
  'set-option -g pane-border-status off; display-message "Pane labels OFF"'

# Left-click session name in status bar to switch to it, otherwise select window
bind -n MouseDown1Status if -F '#{==:#{mouse_status_range},session}' 'switch-client -t =' 'select-window -t ='

# Right-click session name in status bar for session menu
bind -n MouseDown3StatusLeft display-menu -xM -yS -T " Session: #S " \
  "Rename Session"    r "command-prompt -I '#S' \"rename-session '%%'\"" \
  "New Session"       n "command-prompt \"new-session -s '%%'\"" \
  "" \
  "Switch Session"    s "choose-tree -s" \
  "Detach"            d "detach-client" \
  "" \
  "Kill Session"      k "confirm-before -p 'Kill session #S? (y/n)' kill-session"

# Right-click a window tab for window menu
bind -n MouseDown3Status display-menu -xM -yS -T " Window: #W " \
  "Rename Window"     r "command-prompt -I '#W' \"rename-window '%%'\"" \
  "New Window"        n "new-window -c '#{pane_current_path}'" \
  "" \
  "Move Left"         h "swap-window -t -1" \
  "Move Right"        l "swap-window -t +1" \
  "" \
  "Kill Window"       k "confirm-before -p 'Kill window #W? (y/n)' kill-window"

# prefix + r = reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# prefix + ? = help (overrides default)
bind ? display-popup -w 60 -h 35 -T " tmux cheat sheet " "\
echo '';\
echo '  SPLITS';\
echo '  Ctrl-a j       Split right';\
echo '  Ctrl-a i       Split down';\
echo '  Ctrl-a z       Zoom/unzoom pane';\
echo '  Ctrl-a =       Equalize panes';\
echo '';\
echo '  NAVIGATION';\
echo '  Ctrl-h/j/k/l   Navigate panes';\
echo '  Ctrl-a n/p     Next/prev window';\
echo '  Ctrl-a 1-9     Jump to window #';\
echo '';\
echo '  CLAUDE CODE';\
echo '  Ctrl-a c       New Claude window';\
echo '  Ctrl-a C       Claude dev layout';\
echo '  Ctrl-a g       Claude session manager';\
echo '  Ctrl-a y       Copy session ID';\
echo '  Ctrl-a p       Copy pane path';\
echo '  Ctrl-a m       Toggle mouse (select text)';\
echo '  Ctrl-a P       Toggle pane labels (repo/branch)';\
echo '  Ctrl-a X       Kill orphaned agent panes';\
echo '';\
echo '  SESSIONS';\
echo '  Ctrl-a R       Rename session';\
echo '  Ctrl-a Tab     Next session';\
echo '  Ctrl-a S-Tab   Previous session';\
echo '  Ctrl-a w       Session/window tree';\
echo '';\
echo '  WINDOWS/TABS';\
echo '  Ctrl-a s       New shell window';\
echo '  Ctrl-a E       Tile/untile toggle';\
echo '  Ctrl-a ,       Rename current window';\
echo '  Ctrl-a &       Close current window';\
echo '';\
echo '  LINKS';\
echo '  Cmd+Shift+Click  Open URL in browser';\
echo '';\
echo '  OTHER';\
echo '  Ctrl-a d       Detach';\
echo '  Ctrl-a r       Reload config';\
echo '  Ctrl-a ?       This help';\
echo '';\
read -n 1 -s -r -p '  Press any key to close...'"
