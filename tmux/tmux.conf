# ──────────────────────────────────────────────
# Claude Code + Ghostty — tmux config
# ──────────────────────────────────────────────

# True color support (matches Ghostty)
set -g default-terminal "tmux-256color"
set -s terminal-overrides ",xterm-ghostty:RGB,*:Tc"

# Allow passthrough (needed for Claude Code cursor + clipboard)
set -g allow-passthrough on

# Extended terminal features for Ghostty
set -s terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:clipboard:ccolour:cstyle:focus:title:RGB"

# Enable mouse (scrolling, pane select, resize)
set -g mouse on

# prefix + m = toggle mouse (off → native Ghostty selection, on → tmux mouse)
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# NOTE: smcup@:rmcup@ removed — it disabled the alternate screen buffer,
# causing jerky rendering in TUI apps like Claude Code

# Copy tmux selection to system clipboard
set -g set-clipboard on

# Auto-enter copy-mode on mouse drag, so click-and-drag in scrollback selects
# text instead of auto-scrolling to bottom. Without this, tmux treats clicks
# in the visible region as "show me the prompt" and snaps the view.
bind -T root MouseDrag1Pane if-shell -F "#{m/r:(copy|view)-mode,#{pane_mode}}" \
  "send-keys -M" "copy-mode -e ; send-keys -X begin-selection"

# Drag-end copies to OS clipboard + exits copy-mode (no need to press q)
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Bracketed paste: prefix + ] to paste tmux buffer; OS clipboard paste comes
# from Ghostty's cmd+V (passthrough).
bind ] paste-buffer -p

# Increase scrollback (matches your Ghostty 100k)
set -g history-limit 100000

# vi-style copy-mode navigation (matches editorMode=vim in Claude settings)
# h/j/k/l, w/b, ctrl-u/ctrl-d half-page, g/G top/bottom, /?n search, v select, y yank
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# No delay on escape (critical for vim/Claude Code)
set -sg escape-time 0

# Start windows/panes at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Cap automatic window names to prevent status bar overflow
setw -g automatic-rename-format '#{=40:pane_title}'

# ──────────────────────────────────────────────
# Prefix: Ctrl-a (easier than Ctrl-b)
# ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ──────────────────────────────────────────────
# Splits — match your Ghostty keybinds feel
# ──────────────────────────────────────────────
bind j split-window -h -c "#{pane_current_path}" \; select-layout tiled
bind i split-window -v -c "#{pane_current_path}" \; select-layout tiled

# Auto-tile disabled: agent teammate spawns (Claude Code teammateMode=tmux)
# call split-window directly, and a global re-tile resizes every existing pane.
# Manual splits (bind j/i/c/s) still run select-layout tiled explicitly;
# prefix+= rebalances on demand.

# ──────────────────────────────────────────────
# Vim-style pane navigation (matches Ghostty ctrl+hjkl)
# ──────────────────────────────────────────────
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane resize with prefix + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch sessions (Tab cycles through, wraps around)
bind Tab switch-client -n
bind BTab switch-client -p

# prefix + N = new session, prompts for name (defaults to current dir basename)
# Inherits cwd from active pane. Auto-attaches to the new session.
bind N command-prompt -p "New session:" -I "#{b:pane_current_path}" \
  "new-session -s '%%' -c '#{pane_current_path}'"

# Equalize panes (like your cmd+opt+equal)
bind = select-layout tiled

# Zoom toggle (like your cmd+opt+enter)
bind z resize-pane -Z

# ──────────────────────────────────────────────
# Terminal-agnostic status bar — uses ANSI palette references so colors
# adapt to whichever terminal theme is active (Ghostty claude-code,
# iTerm Claude Quiet, Apple Classic, etc.). Same pattern as `bat --theme=ansi`.
#
# Semantic role           ANSI ref      Notes
#   inactive UI text      colour8       bright black / dim grey
#   active session bg     colour12      bright blue (lifted, legible everywhere)
#   active session fg     colour0       black (inverts cleanly on bright bg)
#   prefix / zoom alerts  colour11      bright yellow
#   git info / accent     colour5       magenta
#   hostname bg           colour13      bright magenta (inversion bg)
# ──────────────────────────────────────────────

# Status bar
set -g status-position bottom
set -g status-style "bg=default,fg=default"
set -g status-left-length 60
set -g status-right-length 120
set -g status-interval 5
set -g status-left "#{S:#[range=session|#{session_id}]#{?session_attached,#[fg=colour0 bg=colour12 bold],#[fg=colour8 bg=default]} #S #[norange]}#[fg=colour8 bg=default nobold]│ "
# status-right: tighter — git info + claude + save-freshness dot + time + (SSH only) host
# - dropped: short-path (already in pane title via OSC 2 hook)
# - shortened: claude:<id> → c:<id>  (saves 6 chars)
# - added: save-freshness glyph (●/◐/○) — mirrors Claude statusline indicator
# - hidden: 'local' hostname (only show when actually SSH)
set -g status-right "#(~/bin/tmux-burn-segment)#{?client_prefix,#[fg=colour11 bold] C-a ,}#{?window_zoomed_flag,#[fg=colour11] Z ,}#(~/bin/tmux-mute-indicator)#(~/bin/tmux-fleet-count)#[fg=colour5]#(~/bin/tmux-git-info '#{pane_current_path}')#(~/bin/tmux-claude-session '#{pane_tty}' | sed 's/claude:/c:/') #(~/bin/tmux-save-dot) #[fg=colour8]│ #[fg=colour8]%H:%M#{?#{||:#{n:SSH_CLIENT},#{n:SSH_TTY}}, #[fg=colour0\\,bg=colour13\\,bold] #(hostname -s) ,}"

# Window tabs — single helper per window: branch-aware coloring (main=white,
# feat/*=amber, fix/*=red, PR-*=cyan), dirty marker (●), agent fleet indicator
# (◇N on active when teammates running). Active window keeps black-on-blue
# inversion for instant visual anchor.
set -g window-status-format         "#(~/bin/tmux-window-cell #I 0)"
set -g window-status-current-format "#(~/bin/tmux-window-cell #I 1)"
set -g window-status-separator ""
set -g status-justify left

# Pane borders
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour13,bold"
set -g pane-border-lines heavy

# Per-pane top header — user-controlled status real estate (the Claude
# statusline + prompt line are managed-enterprise territory). Shows pane
# index, role icon (◆ lead / ◇ agent / $ shell), session/cmd label,
# ⚠ when cc-attention is set, 🔒N when locks are held.
set -g pane-border-status top
set -g pane-border-format " #[fg=colour8]#{window_index}.#{pane_index}#[default] #(~/bin/tmux-pane-header #{pane_id} #{pane_current_path})"

# Toggle pane-border-status on/off when you want maximum vertical space
bind P set pane-border-status \; display "Pane header: #{?#{==:#{pane-border-status},off},OFF,ON}"

# Copy-mode selection highlight (ANSI colors — hex not rendered in copy mode on Ghostty+tmux 3.6a)
setw -g mode-style "bg=yellow,fg=black,bold"

# Message/command bar
set -g message-style "bg=default,fg=default"

# ──────────────────────────────────────────────
# Claude Code workflow helpers
# ──────────────────────────────────────────────

# prefix + c = new Claude Code pane (tiled into current window)
bind c split-window -c "#{pane_current_path}" "claude" \; select-layout tiled

# prefix + s = new shell pane (tiled into current window)
bind s split-window -c "#{pane_current_path}" \; select-layout tiled

# prefix + n = new tmux window (= new tab in the bottom status bar)
# inherits cwd from the active pane. prefix + , renames; prefix + & closes.
bind n new-window -c "#{pane_current_path}"

# prefix + C = Claude Code layout (claude left 65%, shell right 35%)
bind C new-window -c "#{pane_current_path}" \; \
  send-keys "claude" Enter \; \
  split-window -h -p 35 -c "#{pane_current_path}" \; \
  select-pane -L

# prefix + h = Claude/tmux system status popup (cc-status dashboard)
bind h display-popup -E -w "70%" -h "75%" "zsh -ic 'cc-status 2>/dev/null; print; print -P %F{8}press any key to close...%f; read -k 1'"

# prefix + g = Claude session manager popup
# fzf-based picker over all past Claude sessions (~/.claude/projects/**/*.jsonl).
# Shows: age, cwd, first user-message preview. Enter resumes that session in
# the current pane (cd + claude --resume <id>).
bind g display-popup -E -w 90% -h 80% "$HOME/bin/claude-tmux"

# prefix + a = cc-jump popup (fzf over RUNNING Claude panes; switch-client target)
# Companion to `g` (which resumes a saved session). Use `a` to navigate
# between live agent panes — completes the cc-running / cc-jump / ⚠ trio.
bind a display-popup -E -w 80% -h 50% "$HOME/bin/claude-jump"

# cc-rich rich session viewer (sidebar — split-window -h, toggle on second
# keypress; the helper tags the new pane title with @cc-rich-sidebar so
# repeat invocations close it instead of stacking).
# - R   pane-scoped view (resolves session from active pane)
# - B   browse-all sessions picker  (B = "Browse"; chosen so Ctrl-a Ctrl-r stays
#                                    with tmux-resurrect's restore — that's
#                                    load-bearing in the save/restore stack)
# - M   merge composer for active pane's session
bind R run-shell "$HOME/bin/cc-rich-sidebar pane #{pane_id}"
bind B run-shell "$HOME/bin/cc-rich-sidebar browse"
bind M run-shell "$HOME/bin/cc-rich-sidebar merge #{pane_id}"

# prefix + y = copy Claude session ID to clipboard
bind y run-shell "~/bin/tmux-claude-session '#{pane_tty}' | sed 's/.*claude://' | tr -d '[:space:]' | pbcopy && tmux display 'Session ID copied'"

# prefix + p = copy pane path to clipboard
bind p run-shell "echo -n '#{pane_current_path}' | pbcopy && tmux display 'Path copied'"

# prefix + E = expose/tile toggle (all windows ↔ tiled panes)
bind E run-shell "$HOME/bin/tmux-tile-session toggle"

# prefix + X = kill all other panes in current window (clean up orphaned agent panes)
bind X confirm-before -p "Kill all other panes in this window? (y/n)" "kill-pane -a"

# Left-click session name in status bar to switch to it, otherwise select window
bind -n MouseDown1Status if -F '#{==:#{mouse_status_range},session}' 'switch-client -t =' 'select-window -t ='

# Right-click session name in status bar for session menu
bind -n MouseDown3StatusLeft display-menu -xM -yS -T " Session: #S " \
  "Rename Session"    r "command-prompt -I '#S' \"rename-session '%%'\"" \
  "New Session"       n "command-prompt \"new-session -s '%%'\"" \
  "" \
  "Switch Session"    s "choose-tree -s" \
  "Detach"            d "detach-client" \
  "" \
  "Kill Session"      k "confirm-before -p 'Kill session #S? (y/n)' kill-session"

# Right-click a window tab for window menu
bind -n MouseDown3Status display-menu -xM -yS -T " Window: #W " \
  "Rename Window"     r "command-prompt -I '#W' \"rename-window '%%'\"" \
  "New Window"        n "new-window -c '#{pane_current_path}'" \
  "" \
  "Move Left"         h "swap-window -t -1" \
  "Move Right"        l "swap-window -t +1" \
  "" \
  "Kill Window"       k "confirm-before -p 'Kill window #W? (y/n)' kill-window"

# prefix + r = reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# prefix + ? = help (overrides default)
bind ? display-popup -w 60 -h 30 -T " tmux cheat sheet " "\
echo '';\
echo '  SPLITS';\
echo '  Ctrl-a j       Split right';\
echo '  Ctrl-a i       Split down';\
echo '  Ctrl-a z       Zoom/unzoom pane';\
echo '  Ctrl-a =       Equalize panes';\
echo '';\
echo '  NAVIGATION';\
echo '  Ctrl-h/j/k/l   Navigate panes';\
echo '  Ctrl-a n/p     Next/prev window';\
echo '  Ctrl-a 1-9     Jump to window #';\
echo '';\
echo '  CLAUDE CODE';\
echo '  Ctrl-a c       New Claude window';\
echo '  Ctrl-a C       Claude dev layout';\
echo '  Ctrl-a g       Claude session manager (resume saved sessions)';\
echo '  Ctrl-a a       cc-jump: jump to a RUNNING Claude pane';\
echo '  Ctrl-a h       Claude/tmux system status (cc-status popup)';\
echo '  Ctrl-a y       Copy session ID';\
echo '  Ctrl-a p       Copy pane path';\
echo '  Ctrl-a m       Toggle mouse (select text)';\
echo '  Ctrl-a X       Kill orphaned agent panes';\
echo '';\
echo '  SESSIONS';\
echo '  Ctrl-a N       New session (prompts for name)';\
echo '  Ctrl-a R       Rename session';\
echo '  Ctrl-a Tab     Next session';\
echo '  Ctrl-a S-Tab   Previous session';\
echo '  Ctrl-a w       Session/window tree';\
echo '';\
echo '  WINDOWS/TABS';\
echo '  Ctrl-a n       New tab (window)';\
echo '  Ctrl-a s       New shell pane in current tab';\
echo '  Ctrl-a c       New Claude pane in current tab';\
echo '  Ctrl-a E       Tile/untile toggle';\
echo '  Ctrl-a ,       Rename current window';\
echo '  Ctrl-a &       Close current window';\
echo '';\
echo '  LINKS';\
echo '  Cmd+Shift+Click  Open URL in browser';\
echo '';\
echo '  OTHER';\
echo '  Ctrl-a d       Detach';\
echo '  Ctrl-a r       Reload config';\
echo '  Ctrl-a ?       This help';\
echo '  Ctrl-a Ctrl-s  Save tmux state (resurrect)';\
echo '  Ctrl-a Ctrl-r  Restore tmux state (resurrect)';\
echo '';\
read -n 1 -s -r -p '  Press any key to close...'"

# ──────────────────────────────────────────────
# TPM (Tmux Plugin Manager) + tmux-claude-save stack
# ──────────────────────────────────────────────
# Save tmux state across restarts: panes, windows, layouts, cwds, AND the
# claude TUI process itself. Pairs with continuum to auto-save every 5 min
# and auto-restore on tmux server start.
#
# Manual: prefix + Ctrl-s = save, prefix + Ctrl-r = restore.
#
# IMPORTANT: TPM `run` line must be the LAST line in this file.

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Capture pane contents so the visible scrollback survives resurrect.
set -g @resurrect-capture-pane-contents 'on'

# Process allow-list. Note we do NOT include plain `~claude` — those panes
# come back as empty shells and the post-restore hook (below) re-launches them
# with `claude --resume <session-id>` from the sidecar, restoring conversation
# context. Agent panes (with full --agent-id command lines) DO get auto-restored
# via the wildcard pattern, since their command line already encodes everything.
set -g @resurrect-processes '"~claude --resume *" "~claude --agent-id *"'
# Persist resurrect state in dotfiles for cross-machine sync (optional).
set -g @resurrect-dir '~/.tmux/resurrect'

# Auto-save every 5 minutes; auto-restore on tmux server start.
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

# Start tmux-cell-daemon (background process keeping window-cell cache fresh).
# tmux runs this once at server start; the daemon's PID-file guard prevents dupes.
run-shell '(nohup ~/bin/tmux-cell-daemon >/dev/null 2>&1 &) >/dev/null 2>&1'

# Per-save sidecar: capture lead-claude pane → session-id mapping. Pairs with
# the post-restore hook below to enable hands-free conversation resumption.
set -g @resurrect-hook-post-save-all 'bash $HOME/bin/tmux-claude-state $HOME/.tmux/resurrect/claude-state.txt >/dev/null 2>&1; bash $HOME/bin/tmux-resurrect-housekeep >/dev/null 2>&1'

# Post-restore: read the sidecar and send `cr <session-id>` to each pane that
# was running a lead-claude session at save time. Restores conversation context
# automatically — no need to manually run `prefix + g` per pane.
# Log goes to ~/.tmux/resurrect/restore.log
set -g @resurrect-hook-post-restore-all 'bash $HOME/bin/tmux-claude-resurrect-restore >/dev/null 2>&1'

# TPM init — must be last line.
run '~/.tmux/plugins/tpm/tpm'
